<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DokaKegiatan — Preview Dokumen PDF</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dka-alert.css" />

  <style>
    :root {
      --c-primary:   #4f46e5;
      --c-secondary: #06b6d4;
      --c-accent:    #f59e0b;
      --c-pink:      #ec4899;
      --c-green:     #10b981;
      --c-orange:    #f97316;
      --c-red:       #ef4444;
      --c-purple:    #7c3aed;
      --c-border:    #e2e8f0;
      --c-text:      #1e293b;
      --c-text-2:    #475569;
      --c-muted:     #94a3b8;
      --c-surface2:  #f8fafc;
      --trans:       .25s cubic-bezier(.4,0,.2,1);
      --toolbar-h:   60px;
      --sidebar-preview-w: 200px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #1e2329;
      color: var(--c-text);
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ════════════════════════════════════
       TOP TOOLBAR
    ════════════════════════════════════ */
    .preview-toolbar {
      height: var(--toolbar-h);
      background: #2d3139;
      border-bottom: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center;
      padding: 0 20px; gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(0,0,0,.3);
      z-index: 100;
    }

    .tb-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none; padding-right: 16px;
      border-right: 1px solid rgba(255,255,255,.1);
    }
    .tb-brand-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg,var(--c-primary),var(--c-secondary));
      display: grid; place-items: center; color: #fff; font-size: .85rem;
    }
    .tb-brand-name {
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: .95rem; color: #fff;
    }
    .tb-brand-name span { color: var(--c-secondary); }

    .tb-doc-info { flex: 1; min-width: 0; }
    .tb-doc-title { font-size: .85rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-doc-meta  { font-size: .7rem; color: rgba(255,255,255,.45); margin-top: 1px; }

    /* Toolbar buttons */
    .tb-btn {
      height: 36px; border-radius: 8px; border: none; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .8rem; font-weight: 700; font-family: 'Plus Jakarta Sans', sans-serif;
      transition: all var(--trans); padding: 0 14px; white-space: nowrap;
    }
    .tb-btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 8px; }
    .tbb-ghost { background: rgba(255,255,255,.07); color: rgba(255,255,255,.75); border: 1px solid rgba(255,255,255,.1); }
    .tbb-ghost:hover { background: rgba(255,255,255,.14); color: #fff; }
    .tbb-export { background: linear-gradient(135deg,var(--c-red),var(--c-orange)); color: #fff; box-shadow: 0 3px 10px rgba(239,68,68,.35); }
    .tbb-export:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(239,68,68,.5); }
    .tbb-primary { background: linear-gradient(135deg,var(--c-primary),var(--c-purple)); color: #fff; box-shadow: 0 3px 10px rgba(79,70,229,.35); }
    .tbb-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,70,229,.5); }

    .tb-divider { width: 1px; height: 24px; background: rgba(255,255,255,.1); }

    /* Page navigation */
    .page-nav {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.06); border-radius: 8px;
      padding: 3px 8px; border: 1px solid rgba(255,255,255,.08);
    }
    .page-nav-btn {
      width: 26px; height: 26px; border-radius: 5px; border: none;
      background: transparent; color: rgba(255,255,255,.6); cursor: pointer;
      display: grid; place-items: center; font-size: .8rem;
      transition: all var(--trans);
    }
    .page-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,.12); color: #fff; }
    .page-nav-btn:disabled { opacity: .3; cursor: default; }
    .page-nav-input {
      width: 36px; text-align: center; background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.15); border-radius: 5px;
      color: #fff; font-family: 'DM Mono', monospace; font-size: .8rem;
      padding: 2px 4px; outline: none;
    }
    .page-nav-input:focus { border-color: var(--c-primary); background: rgba(255,255,255,.15); }
    .page-nav-total { font-size: .78rem; color: rgba(255,255,255,.45); }

    /* Zoom control */
    .zoom-ctrl {
      display: flex; align-items: center; gap: 5px;
      background: rgba(255,255,255,.06); border-radius: 8px;
      padding: 3px 8px; border: 1px solid rgba(255,255,255,.08);
    }
    .zoom-btn {
      width: 24px; height: 24px; border-radius: 4px; border: none;
      background: transparent; color: rgba(255,255,255,.6); cursor: pointer;
      display: grid; place-items: center; font-size: .85rem;
      transition: all var(--trans);
    }
    .zoom-btn:hover { background: rgba(255,255,255,.12); color: #fff; }
    .zoom-val {
      font-family: 'DM Mono', monospace; font-size: .75rem;
      color: rgba(255,255,255,.8); min-width: 40px; text-align: center;
    }

    /* ════════════════════════════════════
       MAIN AREA
    ════════════════════════════════════ */
    .preview-main {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ─── Thumbnail Sidebar ─── */
    .thumb-sidebar {
      width: var(--sidebar-preview-w);
      background: #252a32;
      border-right: 1px solid rgba(255,255,255,.06);
      overflow-y: auto; flex-shrink: 0;
      padding: 12px 8px;
    }
    .thumb-sidebar::-webkit-scrollbar { width: 4px; }
    .thumb-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 99px; }

    .thumb-label {
      font-size: .6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
      color: rgba(255,255,255,.35); margin-bottom: 10px; padding: 0 4px;
    }

    .thumb-item {
      margin-bottom: 10px; cursor: pointer;
      border-radius: 6px; overflow: hidden;
      border: 2px solid transparent; transition: border-color var(--trans);
      position: relative;
    }
    .thumb-item:hover { border-color: rgba(79,70,229,.5); }
    .thumb-item.active { border-color: var(--c-primary); }
    .thumb-page {
      width: 100%; aspect-ratio: 210/297;
      background: #fff; overflow: hidden; display: block;
      position: relative;
    }
    .thumb-num {
      position: absolute; bottom: 3px; right: 5px;
      font-family: 'DM Mono', monospace; font-size: .55rem;
      font-weight: 700; color: rgba(255,255,255,.6);
      background: rgba(0,0,0,.5); padding: 1px 5px; border-radius: 3px;
    }

    /* ─── Canvas Area ─── */
    .canvas-area {
      flex: 1; overflow: auto; padding: 32px;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .canvas-area::-webkit-scrollbar { width: 8px; height: 8px; }
    .canvas-area::-webkit-scrollbar-track { background: rgba(255,255,255,.04); }
    .canvas-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 99px; }
    .canvas-area::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.25); }

    /* ════════════════════════════════════
       PDF PAGE
    ════════════════════════════════════ */
    .pdf-page {
      width: 794px; /* A4 at 96dpi */
      background: #fff;
      border-radius: 2px;
      box-shadow: 0 4px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(0,0,0,.1);
      overflow: hidden;
      flex-shrink: 0;
      transform-origin: top center;
      transition: transform var(--trans);
      position: relative;
    }

    /* Page label above page */
    .page-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100%; }
    .page-label { font-size: .72rem; font-weight: 700; color: rgba(255,255,255,.35); letter-spacing: .5px; }

    /* ──────────────────────────
       DOCUMENT CONTENT STYLES
    ────────────────────────── */
    .doc-page { padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; font-size: 9pt; line-height: 1.5; }

    /* Cover header */
    .doc-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #ec4899 100%);
      padding: 28px 36px 24px;
      position: relative; overflow: hidden;
    }
    .doc-header::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,.04) 0, rgba(255,255,255,.04) 1px, transparent 0, transparent 50%);
      background-size: 14px 14px;
    }
    .doc-header-inner { position: relative; z-index: 1; }
    .doc-logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .doc-logo-box {
      width: 44px; height: 44px; border-radius: 10px;
      background: rgba(255,255,255,.2); backdrop-filter: blur(6px);
      display: grid; place-items: center; color: #fff; font-size: 1.2rem;
      border: 1px solid rgba(255,255,255,.3);
    }
    .doc-org-name { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 12pt; color: #fff; }
    .doc-org-sub  { font-size: 8pt; color: rgba(255,255,255,.7); margin-top: 2px; }
    .doc-title-box { text-align: center; }
    .doc-main-title { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14pt; color: #fff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .doc-sub-title  { font-size: 9pt; color: rgba(255,255,255,.75); }

    /* Header divider line */
    .doc-divider { height: 3px; background: linear-gradient(90deg,var(--c-primary),var(--c-secondary),var(--c-pink)); }

    /* Body */
    .doc-body { padding: 20px 36px 16px; }

    /* Stat summary */
    .doc-stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 18px; }
    .doc-stat-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 10px; text-align: center; position:relative; overflow:hidden; }
    .doc-stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .dsb1::before { background:linear-gradient(90deg,#4f46e5,#06b6d4); }
    .dsb2::before { background:linear-gradient(90deg,#10b981,#34d399); }
    .dsb3::before { background:linear-gradient(90deg,#f59e0b,#f97316); }
    .dsb4::before { background:linear-gradient(90deg,#ec4899,#f472b6); }
    .doc-stat-val { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 14pt; color: #1e293b; }
    .doc-stat-lbl { font-size: 7pt; color: #94a3b8; font-weight: 600; margin-top: 2px; }

    /* Section title */
    .doc-section-title {
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 10pt;
      color: #1e293b; border-bottom: 2px solid #4f46e5; padding-bottom: 5px;
      margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .doc-section-title i { color: #4f46e5; font-size: 9pt; }

    /* Table */
    .doc-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; font-size: 8pt; }
    .doc-table thead th {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      color: #fff; padding: 7px 10px; font-weight: 800; font-size: 7.5pt;
      text-align: left; white-space: nowrap;
    }
    .doc-table thead th:first-child { border-radius: 4px 0 0 0; width: 28px; text-align: center; }
    .doc-table thead th:last-child  { border-radius: 0 4px 0 0; }
    .doc-table tbody tr { border-bottom: 1px solid #f1f5f9; }
    .doc-table tbody tr:nth-child(even) { background: #fafbfc; }
    .doc-table tbody tr:hover { background: rgba(79,70,229,.04); }
    .doc-table tbody td { padding: 7px 10px; color: #475569; vertical-align: top; }
    .doc-table tbody td:first-child { text-align: center; color: #94a3b8; font-family: 'DM Mono',monospace; font-size: 7pt; }

    /* Badges inside doc */
    .doc-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 7px; border-radius: 99px; font-size: 7pt; font-weight: 700; }
    .dba-selesai  { background: #f0fdf4; color: #059669; border: 1px solid #bbf7d0; }
    .dba-berjalan { background: #eff6ff; color: #4f46e5; border: 1px solid #bfdbfe; }
    .dba-draft    { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .dba-rapat    { background: rgba(79,70,229,.1);  color: #4f46e5; }
    .dba-pelatihan{ background: rgba(16,185,129,.1); color: #059669; }
    .dba-kunjungan{ background: rgba(245,158,11,.1); color: #d97706; }
    .dba-sosialisasi { background: rgba(6,182,212,.1); color: #0891b2; }
    .dba-upacara  { background: rgba(236,72,153,.1); color: #be185d; }

    /* Mini bar chart in doc */
    .doc-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; padding: 0 2px; margin-bottom: 16px; }
    .doc-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .doc-bar { width: 100%; border-radius: 3px 3px 0 0; }
    .doc-bar-lbl { font-size: 6pt; color: #94a3b8; font-weight: 700; }
    .doc-bar-val { font-size: 6.5pt; color: #4f46e5; font-weight: 800; }

    /* Progress bars in doc */
    .doc-prog-row { margin-bottom: 8px; }
    .doc-prog-top { display: flex; justify-content: space-between; font-size: 7.5pt; margin-bottom: 3px; }
    .doc-prog-name { font-weight: 700; color: #1e293b; }
    .doc-prog-val  { color: #64748b; font-family: 'DM Mono',monospace; }
    .doc-prog-bg   { height: 6px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
    .doc-prog-fill { height: 100%; border-radius: 99px; }

    /* Info table in doc */
    .doc-info-table { width: 100%; border-collapse: collapse; font-size: 8pt; margin-bottom: 14px; }
    .doc-info-table tr { border-bottom: 1px solid #f1f5f9; }
    .doc-info-table tr:last-child { border-bottom: none; }
    .doc-info-table td { padding: 6px 8px; }
    .doc-info-table td:first-child { color: #94a3b8; font-weight: 700; width: 35%; }
    .doc-info-table td:last-child  { color: #1e293b; font-weight: 600; }

    /* Gallery grid in doc */
    .doc-gallery { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
    .doc-gallery-item { aspect-ratio: 4/3; border-radius: 5px; overflow: hidden; border: 1px solid #e2e8f0; }
    .doc-gallery-img  { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }

    /* Footer */
    .doc-footer {
      background: linear-gradient(90deg, rgba(79,70,229,.06), rgba(6,182,212,.04));
      border-top: 2px solid #e2e8f0; padding: 8px 36px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .doc-footer-text { font-size: 7pt; color: #94a3b8; }
    .doc-footer-page { font-family: 'DM Mono', monospace; font-size: 7pt; color: #94a3b8; }
    .doc-footer-logo { display: flex; align-items: center; gap: 5px; }
    .doc-footer-logo-box { width: 16px; height: 16px; border-radius: 4px; background: linear-gradient(135deg,#4f46e5,#06b6d4); display: grid; place-items: center; color:#fff; font-size:.5rem; }

    /* Page number label */
    .doc-page-num-center { text-align: center; font-size: 7pt; color: #94a3b8; padding: 5px 0; }

    /* Watermark */
    .doc-watermark {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-30deg);
      font-family: 'Nunito', sans-serif; font-weight: 900;
      font-size: 48pt; color: rgba(79,70,229,.04); pointer-events: none;
      letter-spacing: 4px; white-space: nowrap; user-select: none;
    }

    /* ─── Page 2+ sub-header ─── */
    .doc-sub-header {
      background: #f8fafc; border-bottom: 2px solid #e2e8f0;
      padding: 10px 36px; display: flex; align-items: center; justify-content: space-between;
    }
    .doc-sub-header-title { font-family:'Nunito',sans-serif; font-weight:800; font-size:9pt; color:#1e293b; display:flex; align-items:center; gap:6px; }
    .doc-sub-header-meta  { font-size:7.5pt; color:#94a3b8; }

    /* ════════════════════════════════════
       STATUS BAR
    ════════════════════════════════════ */
    .status-bar {
      height: 28px; background: #1a1f27;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; padding: 0 16px; gap: 16px;
      font-size: .68rem; color: rgba(255,255,255,.35); flex-shrink: 0;
    }
    .sb-item { display: flex; align-items: center; gap: 4px; }
    .sb-dot  { width: 6px; height: 6px; border-radius: 50%; background: var(--c-green); animation: dotPulse 2s ease infinite; }
    @keyframes dotPulse { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)} 50%{box-shadow:0 0 0 4px rgba(16,185,129,0)} }

    /* Print styles */
    @media print {
      .preview-toolbar, .thumb-sidebar, .status-bar, .page-label { display: none !important; }
      body { background: #fff; }
      .canvas-area { padding: 0; background: #fff; display: block; }
      .pdf-page { box-shadow: none; border-radius: 0; margin-bottom: 0; width: 100%; }
      .page-wrapper { page-break-after: always; }
    }

    /* Responsive */
    @media(max-width:1000px) {
      .thumb-sidebar { display: none; }
      .pdf-page { width: 100%; }
    }
    @media(max-width:768px) {
      .preview-toolbar { padding: 0 10px; gap: 6px; }
      .tb-brand-name, .tb-doc-info { display: none; }
      .canvas-area { padding: 16px 8px; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════
     TOP TOOLBAR
════════════════════════════════════ -->
<div class="preview-toolbar">
  <!-- Brand -->
  <a href="export-pdf.html" class="tb-brand">
    <div class="tb-brand-icon"><i class="bi bi-camera-reels-fill"></i></div>
    <span class="tb-brand-name">Doka<span>Kegiatan</span></span>
  </a>

  <!-- Doc info -->
  <div class="tb-doc-info">
    <div class="tb-doc-title" id="tbDocTitle">Laporan Kegiatan Bulanan — April 2025</div>
    <div class="tb-doc-meta" id="tbDocMeta">PDF Preview · A4 Portrait · 8 halaman</div>
  </div>

  <div class="tb-divider"></div>

  <!-- Page nav -->
  <div class="page-nav">
    <button class="page-nav-btn" id="btnPrevPage" onclick="prevPage()"><i class="bi bi-chevron-left"></i></button>
    <input type="number" class="page-nav-input" id="pageInput" value="1" min="1" onchange="goToPage(+this.value)" />
    <span class="page-nav-total" id="totalPagesLabel">/ 8</span>
    <button class="page-nav-btn" id="btnNextPage" onclick="nextPage()"><i class="bi bi-chevron-right"></i></button>
  </div>

  <div class="tb-divider"></div>

  <!-- Zoom -->
  <div class="zoom-ctrl">
    <button class="zoom-btn" onclick="zoomOut()"><i class="bi bi-dash-lg"></i></button>
    <span class="zoom-val" id="zoomVal">100%</span>
    <button class="zoom-btn" onclick="zoomIn()"><i class="bi bi-plus-lg"></i></button>
  </div>

  <div class="tb-divider"></div>

  <!-- Actions -->
  <button class="tb-btn tbb-ghost tb-btn-icon" onclick="fitWidth()" title="Fit to Width"><i class="bi bi-arrows-fullscreen"></i></button>
  <button class="tb-btn tbb-ghost tb-btn-icon" onclick="toggleThumbs()" title="Panel Halaman" id="btnThumbs"><i class="bi bi-layout-sidebar-reverse"></i></button>
  <button class="tb-btn tbb-ghost" onclick="window.print()"><i class="bi bi-printer-fill"></i> Cetak</button>
  <button class="tb-btn tbb-export" onclick="doExport()"><i class="bi bi-file-earmark-pdf-fill"></i> Export PDF</button>
  <button class="tb-btn tbb-ghost tb-btn-icon" onclick="window.location.href='export-pdf.html'" title="Kembali"><i class="bi bi-x-lg"></i></button>
</div>

<!-- ════════════════════════════════════
     MAIN AREA
════════════════════════════════════ -->
<div class="preview-main">

  <!-- Thumbnail Sidebar -->
  <div class="thumb-sidebar" id="thumbSidebar">
    <div class="thumb-label">Halaman</div>
    <div id="thumbGrid"></div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <!-- Pages injected by JS -->
  </div>

</div>

<!-- ════════════════════════════════════
     STATUS BAR
════════════════════════════════════ -->
<div class="status-bar">
  <div class="sb-item"><span class="sb-dot"></span> Preview Mode</div>
  <div class="sb-item"><i class="bi bi-file-earmark-pdf"></i> <span id="sbDocType">Laporan Bulanan</span></div>
  <div class="sb-item"><i class="bi bi-calendar3"></i> <span id="sbPeriode">April 2025</span></div>
  <div class="sb-item"><i class="bi bi-building"></i> <span id="sbUnit">Semua Unit Kerja</span></div>
  <div class="sb-item" style="margin-left:auto;"><i class="bi bi-clock"></i> Dibuat: <span id="sbTime"></span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ════════════════════════════════════

════════════════════════════════════ */
function katBadge(kat) {
  const cls = { Rapat:'dba-rapat', Pelatihan:'dba-pelatihan', Kunjungan:'dba-kunjungan', Sosialisasi:'dba-sosialisasi', Upacara:'dba-upacara' };
  return `<span class="doc-badge ${cls[kat]||''}">${kat}</span>`;
}
function statusBadge(s) {
  const cls = { selesai:'dba-selesai', berjalan:'dba-berjalan', draft:'dba-draft' };
  const lbl = { selesai:'Selesai', berjalan:'Berjalan', draft:'Draft' };
  return `<span class="doc-badge ${cls[s]||''}">${lbl[s]||s}</span>`;
}

function docHeader(page, total) {
  if (page === 1) {
    return `
      <div class="doc-header">
        <div class="doc-header-inner">
          <div class="doc-logo-row">
            <div class="doc-logo-box"><i class="bi bi-camera-reels-fill"></i></div>
            <div>
              <div class="doc-org-name">PEMERINTAH KOTA PEKALONGAN</div>
              <div class="doc-org-sub">Dinas Komunikasi dan Informatika</div>
            </div>
          </div>
          <div class="doc-title-box">
            <div class="doc-main-title">${docTitle.toUpperCase()}</div>
            <div class="doc-sub-title">Periode: ${bulanStr} &mdash; ${unitLabel}</div>
          </div>
        </div>
      </div>
      <div class="doc-divider"></div>`;
  }
  return `
    <div class="doc-sub-header">
      <div class="doc-sub-header-title">
        <i class="bi bi-camera-reels-fill" style="color:#4f46e5;"></i>
        ${docTitle.toUpperCase()}
      </div>
      <div class="doc-sub-header-meta">Hal. ${page} / ${total} &nbsp;|&nbsp; ${bulanStr} &nbsp;|&nbsp; ${unitLabel}</div>
    </div>`;
}

function docFooter(page, total) {
  return `
    <div class="doc-footer">
      <div class="doc-footer-logo">
        <div class="doc-footer-logo-box"><i class="bi bi-camera-reels-fill"></i></div>
        <span class="doc-footer-text">DokaKegiatan — Kota Pekalongan &copy; ${TAHUN}</span>

      <div class="doc-footer-page">Hal. ${page} dari ${total}</div>
    </div>`;
}

        <div class="doc-section-title"><i class="bi bi-camera-fill"></i> ${keg.nama} (${keg.foto||8} foto)</div>
        <div class="doc-gallery">
          ${Array.from({length:Math.min(keg.foto||8,8)},(_,i)=>`<div class="doc-gallery-item"><div class="doc-gallery-img" style="background:${GALERI_GRADS[(p+i)%6]};">${GALERI_EMOJIS[(p+i)%16]}</div></div>`).join('')}
        </div>
        <div style="font-size:7.5pt;color:#94a3b8;margin-top:8px;">${keg.tgl} · ${keg.unit} · ${katBadge(keg.kat)}</div>
      </div>
      ${docFooter(p, total)}`);
  }
  return pages;
}

/* ─── REKAP UNIT pages ─── */

  const total = 5; const pages = [];
  pages.push(`
    ${docHeader(1, total)}
    <div class="doc-body">

        <div class="doc-stat-box dsb2"><div class="doc-stat-val">16</div><div class="doc-stat-lbl">Total Kegiatan</div></div>
        <div class="doc-stat-box dsb3"><div class="doc-stat-val">169</div><div class="doc-stat-lbl">Total Foto</div></div>
        <div class="doc-stat-box dsb4"><div class="doc-stat-val">75%</div><div class="doc-stat-lbl">Tingkat Selesai</div></div>
      </div>
      <div class="doc-section-title"><i class="bi bi-building-fill"></i> Rekap Seluruh Unit Kerja</div>
      ${UNIT_DATA.map(u=>`
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px;margin-bottom:10px;">
          <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:10pt;color:#1e293b;margin-bottom:8px;">${u.name}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">

            <div style="text-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:6px;"><div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:12pt;">${u.foto}</div><div style="font-size:6.5pt;color:#94a3b8;">Foto</div></div>
            <div style="text-align:center;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:6px;"><div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:12pt;">${u.pct}%</div><div style="font-size:6.5pt;color:#94a3b8;">Capaian</div></div>
          </div>
          <div style="height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden;"><div style="height:100%;border-radius:99px;background:${u.grad};width:${u.pct}%;"></div></div>
        </div>`).join('')}
    </div>
    ${docFooter(1, total)}`);
  for (let p=2; p<=total; p++) {
    const u = UNIT_DATA[p-2];
    const kegUnit = KEGIATAN_DATA.filter(k=>k.unit===(u?.name||'Diskominfo')).slice(0,6);
    pages.push(`
      ${docHeader(p, total)}
      <div class="doc-body">
        <div class="doc-section-title"><i class="bi bi-building-fill"></i> Detail Unit: ${u?.name||'Unit'}</div>
        <table class="doc-table">
          <thead><tr><th>#</th><th>Nama Kegiatan</th><th>Tanggal</th><th>Kategori</th><th>Status</th><th style="text-align:center;">Foto</th></tr></thead>
          <tbody>${(kegUnit.length?kegUnit:[KEGIATAN_DATA[0]]).map((d,i)=>`<tr><td>${i+1}</td><td style="font-weight:700;color:#1e293b;">${d.nama}</td><td>${d.tgl}</td><td>${katBadge(d.kat)}</td><td>${statusBadge(d.status)}</td><td style="text-align:center;">${d.foto||'—'}</td></tr>`).join('')}</tbody>
        </table>
      </div>

/* ─── KUSTOM pages ─── */
function buildKustom() {
  const total = 6; const pages = [];
  pages.push(`
    ${docHeader(1, total)}
    <div class="doc-body">
      <div class="doc-section-title"><i class="bi bi-sliders2"></i> Laporan Kustom</div>
      <div class="doc-stat-grid">
        <div class="doc-stat-box dsb1"><div class="doc-stat-val">16</div><div class="doc-stat-lbl">Kegiatan</div></div>
        <div class="doc-stat-box dsb2"><div class="doc-stat-val">169</div><div class="doc-stat-lbl">Foto</div></div>
        <div class="doc-stat-box dsb3"><div class="doc-stat-val">5</div><div class="doc-stat-lbl">Unit</div></div>
        <div class="doc-stat-box dsb4"><div class="doc-stat-val">5</div><div class="doc-stat-lbl">Kategori</div></div>
      </div>
      <div class="doc-section-title"><i class="bi bi-list-ul"></i> Data Kegiatan Terpilih</div>
      <table class="doc-table">
        <thead><tr><th>#</th><th>Nama Kegiatan</th><th>Tanggal</th><th>Unit</th><th>Status</th></tr></thead>
        <tbody>${KEGIATAN_DATA.slice(0,8).map(d=>`<tr><td>${d.no}</td><td style="font-weight:700;color:#1e293b;">${d.nama}</td><td>${d.tgl}</td><td>${d.unit}</td><td>${statusBadge(d.status)}</td></tr>`).join('')}</tbody>
      </table>
    </div>
    ${docFooter(1, total)}`);
  for (let p=2; p<=total; p++) {
    pages.push(`
      ${docHeader(p, total)}
      <div class="doc-body">
        <div class="doc-section-title"><i class="bi bi-file-text-fill"></i> Halaman ${p} — Konten Kustom</div>
        <p style="font-size:8.5pt;color:#475569;line-height:1.7;">Konten halaman ${p} dari laporan kustom sesuai parameter yang dipilih.</p>
        <table class="doc-table">
          <thead><tr><th>#</th><th>Nama Kegiatan</th><th>Tanggal</th><th>Status</th></tr></thead>
          <tbody>${KEGIATAN_DATA.slice((p-1)*2, p*2+2).map((d,i)=>`<tr><td>${i+1}</td><td style="font-weight:700;color:#1e293b;">${d.nama}</td><td>${d.tgl}</td><td>${statusBadge(d.status)}</td></tr>`).join('')}</tbody>
        </table>

/* ─── Select builder ─── */
function buildPages() {
  switch (DOC_TYPE) {
    case 'laporan-bulanan': return buildLaporanBulanan();
    case 'daftar-kegiatan': return buildDaftarKegiatan();
    case 'galeri-foto'    : return buildGaleriFoto();
    case 'rekap-unit'     : return buildRekapUnit();
    case 'kustom'         : return buildKustom();
    default               : return buildLaporanBulanan();
  }
}

/* ════════════════════════════════════
   RENDER
════════════════════════════════════ */
const PAGES_HTML = buildPages();
const TOTAL_PAGES = PAGES_HTML.length;
let currentPage = 1;
let currentZoom = 1.0;
let thumbsVisible = true;

document.getElementById('totalPagesLabel').textContent = `/ ${TOTAL_PAGES}`;
document.getElementById('tbDocMeta').textContent = `PDF Preview · A4 Portrait · ${TOTAL_PAGES} halaman`;
document.getElementById('pageInput').max = TOTAL_PAGES;

function renderAllPages() {
  const area = document.getElementById('canvasArea');
  area.innerHTML = PAGES_HTML.map((html, i) => `
    <div class="page-wrapper" id="pw-${i+1}">
      <div class="page-label">Halaman ${i+1} dari ${TOTAL_PAGES}</div>
      <div class="pdf-page doc-page" id="page-${i+1}" style="transform:scale(${currentZoom});margin-bottom:${28*(currentZoom-1)}px;">
        ${html}
      </div>
    </div>`).join('');
}

function renderThumbs() {
  const grid = document.getElementById('thumbGrid');
  grid.innerHTML = PAGES_HTML.map((html, i) => `
    <div class="thumb-item ${i+1===currentPage?'active':''}" id="thumb-${i+1}" onclick="goToPage(${i+1})">
      <div class="thumb-page">
        <iframe srcdoc="${encodeHTML(html)}" style="width:794px;height:1123px;border:none;transform:scale(${180/794});transform-origin:top left;pointer-events:none;" scrolling="no"></iframe>
      </div>
      <div class="thumb-num">${i+1}</div>
    </div>`).join('');
}

function encodeHTML(str) {
  return str.replace(/"/g, '&quot;');
}

/* ════════════════════════════════════
   NAVIGATION
════════════════════════════════════ */
function goToPage(p) {
  p = Math.max(1, Math.min(TOTAL_PAGES, +p));
  currentPage = p;
  document.getElementById('pageInput').value = p;
  document.getElementById('btnPrevPage').disabled = p === 1;
  document.getElementById('btnNextPage').disabled = p === TOTAL_PAGES;
  /* Scroll to page */
  const pw = document.getElementById(`pw-${p}`);
  if (pw) pw.scrollIntoView({ behavior: 'smooth', block: 'start' });
  /* Update thumbnails */
  document.querySelectorAll('.thumb-item').forEach((el, i) => {
    el.classList.toggle('active', i+1 === p);
  });
  /* Scroll thumbnail into view */
  const th = document.getElementById(`thumb-${p}`);
  if (th) th.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function prevPage() { goToPage(currentPage - 1); }
function nextPage() { goToPage(currentPage + 1); }

/* Detect visible page on scroll */
function detectCurrentPage() {
  const area = document.getElementById('canvasArea');
  const scrollTop = area.scrollTop + 100;
  for (let i = 1; i <= TOTAL_PAGES; i++) {
    const pw = document.getElementById(`pw-${i}`);
    if (!pw) continue;
    if (pw.offsetTop <= scrollTop && (pw.offsetTop + pw.offsetHeight) > scrollTop) {
      if (currentPage !== i) {
        currentPage = i;
        document.getElementById('pageInput').value = i;
        document.getElementById('btnPrevPage').disabled = i === 1;
        document.getElementById('btnNextPage').disabled = i === TOTAL_PAGES;
        document.querySelectorAll('.thumb-item').forEach((el,idx) => el.classList.toggle('active', idx+1===i));
        const th = document.getElementById(`thumb-${i}`);
        if (th) th.scrollIntoView({ behavior:'smooth', block:'nearest' });
      }
      break;
    }
  }
}
document.getElementById('canvasArea').addEventListener('scroll', detectCurrentPage, { passive: true });

/* ════════════════════════════════════
   ZOOM
════════════════════════════════════ */
const ZOOM_STEPS = [0.5, 0.6, 0.7, 0.8, 0.9, 1.0, 1.1, 1.25, 1.5, 1.75, 2.0];

function applyZoom() {
  document.getElementById('zoomVal').textContent = Math.round(currentZoom * 100) + '%';
  document.querySelectorAll('.pdf-page').forEach(el => {
    el.style.transform = `scale(${currentZoom})`;
    const extra = 28 * (currentZoom - 1);
    el.style.marginBottom = extra + 'px';
    el.style.marginTop    = extra > 0 ? extra/2 + 'px' : '0';
  });
}

function zoomIn() {
  const idx = ZOOM_STEPS.findIndex(z => z > currentZoom);
  if (idx !== -1) { currentZoom = ZOOM_STEPS[idx]; applyZoom(); }
}
function zoomOut() {
  const idx = [...ZOOM_STEPS].reverse().findIndex(z => z < currentZoom);
  if (idx !== -1) { currentZoom = ZOOM_STEPS[ZOOM_STEPS.length-1-idx]; applyZoom(); }
}
function fitWidth() {
  const area = document.getElementById('canvasArea');
  currentZoom = Math.min(1, (area.clientWidth - 64) / 794);
  currentZoom = Math.round(currentZoom * 10) / 10;
  applyZoom();
}

/* Keyboard zoom */
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); zoomIn(); }
    if (e.key === '-')                  { e.preventDefault(); zoomOut(); }
    if (e.key === '0')                  { e.preventDefault(); currentZoom=1; applyZoom(); }
  }
  if (e.key === 'ArrowRight' || e.key === 'PageDown') nextPage();
  if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   prevPage();
});

/* ════════════════════════════════════
   THUMBNAIL TOGGLE
════════════════════════════════════ */
function toggleThumbs() {
  thumbsVisible = !thumbsVisible;
  document.getElementById('thumbSidebar').style.display = thumbsVisible ? '' : 'none';
  document.getElementById('btnThumbs').style.background = thumbsVisible ? 'rgba(79,70,229,.3)' : '';
  document.getElementById('btnThumbs').style.borderColor= thumbsVisible ? 'rgba(79,70,229,.4)' : '';
}

/* ════════════════════════════════════
   EXPORT (SIMULATE)
════════════════════════════════════ */
function doExport() {
  const btn = document.querySelector('.tbb-export');
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm" style="width:14px;height:14px;border-width:2px;"></span> Mengekspor...';
  setTimeout(() => {
    btn.disabled = false; btn.innerHTML = orig;
    if (typeof DKA !== 'undefined') {
      DKA.notify({ type:'success', title:'Export PDF Berhasil!', message:`${docTitle}_${bulanStr.replace(/\s/g,'_')}.pdf (${getPageCount()} hal) siap diunduh.`, duration:7000 });
    } else {
      alert('File PDF siap diunduh!');
    }
  }, 2500);
}

/* ════════════════════════════════════
   INIT
════════════════════════════════════ */
renderAllPages();
renderThumbs();
goToPage(1);

/* Auto-fit on load */
window.addEventListener('load', () => {
  const area = document.getElementById('canvasArea');
  if (area.clientWidth < 820) fitWidth();
});
</script>
